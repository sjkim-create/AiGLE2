<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>AiGLE</title>
    <script>
      // GitHub Pages SPA redirect
      // 404 발생 시 index.html로 리다이렉트
      var l = window.location;
      l.replace(
        l.protocol +
          "//" +
          l.hostname +
          (l.port ? ":" + l.port : "") +
          l.pathname.split("/").slice(0, 2).join("/") +
          "/?p=" +
          l.pathname.slice(1) +
          (l.search ? "&q=" + l.search.slice(1) : "") +
          l.hash,
      );
    </script>
  </head>
  <body></body>
</html>
